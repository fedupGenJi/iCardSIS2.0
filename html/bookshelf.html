<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU-iCardSIS Background Test</title>
    <link rel="stylesheet" href="../css/bookshelf.css"> 

</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-left">
            <img src="../assests/images/ICARDSIS.png" alt="KU Logo" class="logo">
            <span class="app-title">KU-iCardSIS</span>
        </div>
        <div class="header-title">LIBRARY</div>
        <div class="header-right">
            <div class="admin-info">
                <span class="admin-name">Admin Name</span><br>
                <span class="designation">Librarian</span>
            </div>
            <img src="../assests/images/admin.jpg" alt="Admin Profile" class="profile-photo">
        </div>
    </header>

    <!-- Bookshelf Content -->
    <main class="bookshelf-container">
        <h1 class="page-title">Bookshelf</h1>
        <div class="search-container">
            <input type="text" placeholder="Search Book" class="search-box">
            <button class="search-btn">Search</button>
        </div>
        <table class="bookshelf-table">
            <thead>
                <tr>
                    <th>Book ID</th>
                    <th>Book Name</th>
                    <th>Stock Available</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example rows -->
                <tr>
                    <td>1</td>
                    <td>Sample Book 1</td>
                    <td>10</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Sample Book 2</td>
                    <td>8</td>
                </tr>
                <!-- More rows as needed -->
            </tbody>
        </table>
    </main>
</body>
</html>
